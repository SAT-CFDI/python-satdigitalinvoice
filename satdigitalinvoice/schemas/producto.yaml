$schema: 'https://json-schema.org/draft/2020-12/schema'
type: object
properties:
  Detalle:
    type: string
  Concepto:
    type: object
    properties:
      CuentaPredial:
        anyOf:
        - type: string
        - type: array
          items:
            type: string
      ClaveProdServ:
        type: string
      ClaveUnidad:
        type: string
      Descripcion:
        type: string
    additionalProperties: false
    required:
    - Descripcion
    - ClaveProdServ
    - ClaveUnidad
additionalProperties: false


